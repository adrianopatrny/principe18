<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calle Príncipe 18 — Guest Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1612;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-4px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2e2820;border-radius:2px}

.app{width:100%;max-width:420px;height:88vh;max-height:720px;display:flex;flex-direction:column;background:#1a1612;border-radius:18px;border:1px solid rgba(201,168,76,.2);box-shadow:0 24px 60px rgba(0,0,0,.6);overflow:hidden}

/* Header */
.header{background:#252018;padding:14px 16px 10px;border-bottom:1px solid rgba(201,168,76,.15);flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.avatar-header{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#c60b1e);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.header-name{font-size:14px;font-weight:600;color:#e8c97a}
.header-sub{font-size:10px;color:#8a7e6a;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.back-btn{background:transparent;border:1px solid rgba(201,168,76,.25);color:#8a7e6a;padding:4px 10px;border-radius:10px;font-size:11px;cursor:pointer;font-family:inherit;display:none}
.back-btn:hover{color:#e8c97a;border-color:#c9a84c}

/* Lang bar */
.lang-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.lang-btn{background:transparent;border:1px solid rgba(201,168,76,.15);color:#8a7e6a;padding:2px 7px;border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.lang-btn:hover,.lang-btn.active{background:rgba(201,168,76,.2);border-color:#c9a84c;color:#e8c97a}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;align-items:flex-start;animation:fadeIn .3s ease forwards}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.av.bot{background:linear-gradient(135deg,#c9a84c,#c60b1e)}
.av.user{background:#2e2820;border:1px solid rgba(201,168,76,.3)}
.bubble{max-width:82%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.6}
.bubble.bot{background:#252018;border:1px solid rgba(201,168,76,.15);border-top-left-radius:4px;color:#f5f0e8}
.bubble.user{background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.25);border-top-right-radius:4px;color:#f5f0e8}
.bubble strong{color:#e8c97a}

/* Hostel buttons */
.hostel-list{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.hostel-btn{background:#2e2820;border:1px solid rgba(201,168,76,.25);color:#f5f0e8;padding:10px 13px;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;text-align:left;transition:all .15s;width:100%}
.hostel-btn:hover{background:rgba(201,168,76,.15);border-color:#c9a84c;color:#e8c97a}
.hostel-emoji{font-size:16px}
.hostel-name{font-weight:600}

/* Suggestions */
.suggestions{display:flex;flex-wrap:wrap;gap:6px;padding-left:36px;animation:fadeIn .3s ease forwards}
.sugg-btn{background:transparent;border:1px solid rgba(201,168,76,.35);color:#e8c97a;padding:5px 11px;border-radius:14px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.sugg-btn:hover{background:rgba(201,168,76,.15);border-color:#c9a84c}

/* Typing */
.typing{display:flex;gap:8px;align-items:center}
.typing-dots{background:#252018;border:1px solid rgba(201,168,76,.15);border-radius:14px;border-top-left-radius:4px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:#c9a84c;opacity:.7}
.dot:nth-child(1){animation:bounce 1.2s 0s infinite}
.dot:nth-child(2){animation:bounce 1.2s .2s infinite}
.dot:nth-child(3){animation:bounce 1.2s .4s infinite}

/* Input */
.input-area{padding:10px 12px 12px;border-top:1px solid rgba(201,168,76,.12);display:flex;gap:8px;flex-shrink:0;background:#1a1612}
.input-area input{flex:1;background:#252018;border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:10px 16px;color:#f5f0e8;font-family:inherit;font-size:13.5px;outline:none;transition:border-color .2s}
.input-area input:focus{border-color:rgba(201,168,76,.5)}
.input-area input::placeholder{color:#8a7e6a}
.input-area input:disabled{opacity:.5}
.send-btn{width:40px;height:40px;border-radius:50%;background:#2e2820;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.send-btn.active{background:linear-gradient(135deg,#c9a84c,#a8863a);box-shadow:0 2px 12px rgba(201,168,76,.3)}
.send-btn.active:hover{transform:scale(1.05)}
.send-btn svg{width:16px;height:16px;fill:#8a7e6a}
.send-btn.active svg{fill:#1a1612}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="avatar-header" id="headerEmoji">🏨</div>
        <div>
          <div class="header-name" id="headerName">Calle Príncipe 18</div>
          <div class="header-sub">Guest Assistant · 24/7</div>
        </div>
      </div>
      <button class="back-btn" id="backBtn" onclick="reset()">← Back</button>
    </div>
    <div class="lang-bar" id="langBar"></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="← Select your hostel first" disabled onkeypress="handleKey(event)" oninput="updateSendBtn()"/>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
const HOSTELS = {
  "Madrid Star":    {floor:"2nd",floorEs:"2º",side:"Right",sideEs:"Derecha",emoji:"⭐",phone:"911 42 80 92"},
  "Petite Maman":   {floor:"1st",floorEs:"1º",side:"Right",sideEs:"Derecha",emoji:"🏡",phone:"915 31 66 00"},
  "Palacio Madrid": {floor:"3rd",floorEs:"3º",side:"Left", sideEs:"Izquierda",emoji:"🏛️",phone:"915 31 32 70"},
  "Madrid Sol":     {floor:"4th",floorEs:"4º",side:"Left", sideEs:"Izquierda",emoji:"☀️",phone:"915 31 32 70"}
};

const LANGS=[
  {code:"en",label:"🇬🇧"},{code:"es",label:"🇪🇸"},{code:"fr",label:"🇫🇷"},
  {code:"de",label:"🇩🇪"},{code:"it",label:"🇮🇹"},{code:"pt",label:"🇵🇹"},
  {code:"ja",label:"🇯🇵"},{code:"zh",label:"🇨🇳"},{code:"ko",label:"🇰🇷"},
  {code:"ru",label:"🇷🇺"},{code:"ar",label:"🇸🇦"},{code:"ca",label:"CA"},
  {code:"gl",label:"GL"},{code:"eu",label:"EU"}
];

const LANG_NAMES={en:"English",es:"Spanish",ca:"Catalan",gl:"Galician",eu:"Basque",fr:"French",de:"German",it:"Italian",pt:"Portuguese",ja:"Japanese",zh:"Chinese",ko:"Korean",ru:"Russian",ar:"Arabic"};

const WELCOME={
  en:"Hi! Which hostel did you book? 👇",
  es:"¡Hola! ¿En qué hostal tienes reserva? 👇",
  fr:"Bonjour! Dans quel hôtel avez-vous réservé? 👇",
  de:"Hallo! In welchem Hostel haben Sie gebucht? 👇",
  it:"Ciao! In quale ostello hai prenotato? 👇",
  pt:"Olá! Em qual hostel tem reserva? 👇",
  ja:"こんにちは！どのホステルをご予約ですか？👇",
  zh:"您好！您预订的是哪家旅馆？👇",
  ko:"안녕하세요! 어느 호스텔에 예약하셨나요? 👇",
  ru:"Привет! В каком хостеле у вас бронь? 👇",
  ar:"مرحباً! في أيّ نزل حجزتَ؟ 👇",
  ca:"Hola! En quin hostal tens reserva? 👇",
  gl:"Ola! En cal hostal tes reserva? 👇",
  eu:"Kaixo! Zein hostaletan duzu erreserba? 👇"
};

const GREETINGS={
  en:(h,n)=>`You're all set! ${h.emoji}\n\nYou're at **${n}** — **${h.floor} floor, ${h.side} side**. Ask me anything!`,
  es:(h,n)=>`¡Perfecto! ${h.emoji}\n\nTu hostal es **${n}** — **${h.floorEs} piso, ${h.sideEs}**. ¡Pregúntame lo que quieras!`,
  fr:(h,n)=>`Parfait! ${h.emoji}\n\nVotre hôtel: **${n}** — **${h.floor} étage, ${h.side}**. Posez vos questions!`,
  de:(h,n)=>`Alles klar! ${h.emoji}\n\n**${n}** — **${h.floor}. Stock, ${h.side}**. Stellen Sie Ihre Fragen!`,
  it:(h,n)=>`Perfetto! ${h.emoji}\n\n**${n}** — **${h.floor}° piano, ${h.side}**. Chiedi pure!`,
  pt:(h,n)=>`Ótimo! ${h.emoji}\n\n**${n}** — **${h.floor}º andar, ${h.side}**. Pergunte à vontade!`,
  ja:(h,n)=>`了解です！${h.emoji}\n\n**${n}**、**${h.floor}階・${h.side==='Right'?'右':'左'}側**。何でも聞いてください！`,
  zh:(h,n)=>`好的！${h.emoji}\n\n**${n}**，**${h.floorEs}楼${h.side==='Right'?'右':'左'}侧**。请随时提问！`,
  ko:(h,n)=>`알겠습니다！${h.emoji}\n\n**${n}**, **${h.floorEs}층 ${h.side==='Right'?'오른쪽':'왼쪽'}**. 무엇이든 물어보세요！`,
  ru:(h,n)=>`Отлично! ${h.emoji}\n\n**${n}** — **${h.floor} этаж, ${h.side==='Right'?'справа':'слева'}**. Задавайте вопросы!`,
  ar:(h,n)=>`رائع! ${h.emoji}\n\n**${n}** — **الطابق ${h.floorEs}، ${h.side==='Right'?'يمين':'يسار'}**. اسألني أي شيء!`,
  ca:(h,n)=>`Perfecte! ${h.emoji}\n\n**${n}** — **${h.floorEs} pis, ${h.sideEs}**. Pregunta'm el que vulguis!`,
  gl:(h,n)=>`Perfecto! ${h.emoji}\n\n**${n}** — **${h.floorEs} andar, ${h.sideEs}**. Pregúntame o que queiras!`,
  eu:(h,n)=>`Ezin hobeto! ${h.emoji}\n\n**${n}** — **${h.floorEs} solairua, ${h.sideEs}**. Galdetu nahi duzuna!`
};

const SUGGESTIONS={
  en:["🚪 How do I get in?","🏢 What floor am I on?","🚇 How do I get here?","🛗 Elevator not working","📞 Call the hostel"],
  es:["🚪 ¿Cómo entro?","🏢 ¿En qué piso estoy?","🚇 ¿Cómo llego?","🛗 El ascensor no va","📞 Llamar al hostal"],
  fr:["🚪 Comment entrer?","🏢 Quel étage?","🚇 Comment venir?","🛗 Ascenseur bloqué","📞 Appeler"],
  de:["🚪 Wie rein?","🏢 Welches Stockwerk?","🚇 Wie komme ich hin?","🛗 Aufzug kaputt","📞 Anrufen"],
  it:["🚪 Come entro?","🏢 Che piano?","🚇 Come arrivo?","🛗 Ascensore bloccato","📞 Chiamare"],
  pt:["🚪 Como entro?","🏢 Que andar?","🚇 Como chego?","🛗 Elevador parado","📞 Ligar"],
  ja:["🚪 入り方は？","🏢 何階？","🚇 行き方は？","🛗 エレベーター故障","📞 電話する"],
  zh:["🚪 怎么进？","🏢 几楼？","🚇 怎么到？","🛗 电梯坏了","📞 打电话"],
  ko:["🚪 어떻게 들어가요?","🏢 몇 층?","🚇 어떻게 가요?","🛗 엘리베이터 고장","📞 전화하기"],
  ru:["🚪 Как войти?","🏢 Этаж?","🚇 Как добраться?","🛗 Лифт сломан","📞 Позвонить"],
  ar:["🚪 كيف أدخل؟","🏢 أي طابق؟","🚇 كيف أصل؟","🛗 المصعد معطل","📞 اتصل"],
  ca:["🚪 Com entro?","🏢 Quin pis?","🚇 Com hi arribo?","🛗 Ascensor parat","📞 Trucar"],
  gl:["🚪 Como entro?","🏢 En que andar?","🚇 Como chego?","🛗 Ascensor parado","📞 Chamar"],
  eu:["🚪 Nola sartu?","🏢 Zein solairu?","🚇 Nola iritsi?","🛗 Igogailua geldi","📞 Deitu"]
};

const PLACEHOLDER={
  en:"Type your question...",es:"Escribe tu pregunta...",fr:"Écrivez votre question...",
  de:"Ihre Frage...",it:"Scrivi la tua domanda...",pt:"Escreva a sua pergunta...",
  ja:"質問を入力...",zh:"输入您的问题...",ko:"질문을 입력하세요...",
  ru:"Задайте вопрос...",ar:"اكتب سؤالك...",ca:"Escriu la teva pregunta...",
  gl:"Escribe a túa pregunta...",eu:"Idatzi zure galdera..."
};

const SELECT_FIRST={
  en:"← Select your hostel first",es:"← Primero selecciona tu hostal",
  fr:"← Sélectionnez d'abord",de:"← Zuerst Hostel wählen",
  it:"← Seleziona prima",pt:"← Selecione primeiro",
  ja:"← まずホステルを選んでください",zh:"← 请先选择旅馆",
  ko:"← 먼저 호스텔을 선택하세요",ru:"← Сначала выберите хостел",
  ar:"← اختر النزل أولاً",ca:"← Selecciona primer",
  gl:"← Selecciona primeiro",eu:"← Lehenik hautatu"
};

function getSystemPrompt(hostel,lang){
  const h=HOSTELS[hostel];
  return `You are a friendly, concise guest assistant for ${hostel} hostel at Calle Príncipe 18, Madrid.

HOSTEL: ${hostel} ${h.emoji}
FLOOR: ${h.floor} floor, ${h.side} side (${h.floorEs} piso, ${h.sideEs})
PHONE: ${h.phone}

BUILDING ACCESS:
- Address: Calle Príncipe 18, 28012 Madrid — 2 min from Puerta del Sol
- Portal: iron gate-style doors (see-through)
- LEFT of entrance: 100 Montaditos restaurant
- RIGHT of entrance: La Abacería del Príncipe (taberna)
- Intercom (telefonillo) at entrance — press the ${hostel} button
- Porter (portero) in small room BEHIND elevator on ground floor
- If no answer: call ${h.phone}

ELEVATOR (120 years old!):
- 3 doors: 1 on each floor + 2 on cabin
- ALL 3 must be fully closed to work
- If stuck: a door is open on another floor
- Stairs are right next to it

GETTING HERE:
- Metro lines 1,2,3 → Sol (2 min walk)
- Cercanías C3 & C4 → Sol
- Taxi/Uber: Plaza de Canalejas

NEARBY:
- La Abacería del Príncipe — tapas & wine, right next door
- 100 Montaditos — cheap food, next to entrance
- Plaza de Santa Ana — 2 min, bars
- Plaza Mayor — 5 min
- Puerta del Sol — 2 min
- Prado Museum — 15 min
- Retiro Park — 20 min
- Gran Vía — 10 min

RULES:
- Reply ONLY in ${LANG_NAMES[lang]}
- Friendly and VERY concise — max 3-4 short lines
- 1-2 emojis naturally
- Sound like a helpful friend
- NEVER mention other hostels
- Phone number: ${h.phone}`;
}

// State
let lang="en", hostel=null, history=[], loading=false;

// Init
buildLangBar();
showWelcome();

function buildLangBar(){
  const bar=document.getElementById('langBar');
  bar.innerHTML='';
  LANGS.forEach(l=>{
    const btn=document.createElement('button');
    btn.className='lang-btn'+(l.code===lang?' active':'');
    btn.textContent=l.label;
    btn.onclick=()=>switchLang(l.code);
    bar.appendChild(btn);
  });
}

function switchLang(code){
  lang=code;
  buildLangBar();
  reset();
}

function reset(){
  hostel=null; history=[]; loading=false;
  document.getElementById('headerName').textContent='Calle Príncipe 18';
  document.getElementById('headerEmoji').textContent='🏨';
  document.getElementById('backBtn').style.display='none';
  const inp=document.getElementById('input');
  inp.disabled=true;
  inp.placeholder=SELECT_FIRST[lang]||SELECT_FIRST.en;
  updateSendBtn();
  showWelcome();
}

function showWelcome(){
  const chat=document.getElementById('chat');
  chat.innerHTML='';
  addBotMessage(WELCOME[lang]||WELCOME.en, true);
}

function selectHostel(name){
  hostel=name;
  history=[];
  const h=HOSTELS[name];
  document.getElementById('headerName').textContent=name;
  document.getElementById('headerEmoji').textContent=h.emoji;
  document.getElementById('backBtn').style.display='block';
  const inp=document.getElementById('input');
  inp.disabled=false;
  inp.placeholder=PLACEHOLDER[lang]||PLACEHOLDER.en;
  inp.focus();
  updateSendBtn();

  // Clear and greet
  document.getElementById('chat').innerHTML='';
  const greetFn=GREETINGS[lang]||GREETINGS.en;
  addBotMessage(greetFn(h,name));
  showSuggestions();
}

function addBotMessage(text, withHostelButtons=false){
  const chat=document.getElementById('chat');
  const msg=document.createElement('div');
  msg.className='msg';
  const av=document.createElement('div');
  av.className='av bot';
  av.textContent='🏨';
  const bub=document.createElement('div');
  bub.className='bubble bot';
  bub.innerHTML=formatText(text);

  if(withHostelButtons){
    const list=document.createElement('div');
    list.className='hostel-list';
    Object.entries(HOSTELS).forEach(([name,info])=>{
      const btn=document.createElement('button');
      btn.className='hostel-btn';
      btn.innerHTML=`<span class="hostel-emoji">${info.emoji}</span><span class="hostel-name">${name}</span>`;
      btn.onclick=()=>selectHostel(name);
      list.appendChild(btn);
    });
    bub.appendChild(list);
  }

  msg.appendChild(av);
  msg.appendChild(bub);
  chat.appendChild(msg);
  scrollBottom();
}

function addUserMessage(text){
  const chat=document.getElementById('chat');
  const msg=document.createElement('div');
  msg.className='msg user';
  const av=document.createElement('div');
  av.className='av user';
  av.textContent='👤';
  const bub=document.createElement('div');
  bub.className='bubble user';
  bub.textContent=text;
  msg.appendChild(av);
  msg.appendChild(bub);
  chat.appendChild(msg);
  scrollBottom();
}

function showTyping(){
  const chat=document.getElementById('chat');
  const t=document.createElement('div');
  t.className='typing'; t.id='typing';
  t.innerHTML=`<div class="av bot">🏨</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(t);
  scrollBottom();
}

function removeTyping(){
  const t=document.getElementById('typing');
  if(t) t.remove();
}

function showSuggestions(){
  removeSuggestions();
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');
  wrap.className='suggestions'; wrap.id='suggestions';
  (SUGGESTIONS[lang]||SUGGESTIONS.en).forEach(s=>{
    const btn=document.createElement('button');
    btn.className='sugg-btn';
    btn.textContent=s;
    btn.onclick=()=>handleSuggestion(s);
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  scrollBottom();
}

function removeSuggestions(){
  const s=document.getElementById('suggestions');
  if(s) s.remove();
}

function handleSuggestion(text){
  removeSuggestions();
  addUserMessage(text);

  // Phone button — no API call needed
  if(text.includes('📞')){
    const phoneResponses={
      en:`📞 Call us directly:\n\n**${HOSTELS[hostel].phone}**\n\nWe're here to help!`,
      es:`📞 Llámanos:\n\n**${HOSTELS[hostel].phone}**\n\n¡Estamos aquí!`,
      fr:`📞 Appelez-nous:\n\n**${HOSTELS[hostel].phone}**`,
      de:`📞 Rufen Sie uns an:\n\n**${HOSTELS[hostel].phone}**`,
      it:`📞 Chiamaci:\n\n**${HOSTELS[hostel].phone}**`,
      pt:`📞 Ligue:\n\n**${HOSTELS[hostel].phone}**`,
      ja:`📞 お電話ください：\n\n**${HOSTELS[hostel].phone}**`,
      zh:`📞 请致电：\n\n**${HOSTELS[hostel].phone}**`,
      ko:`📞 전화하세요：\n\n**${HOSTELS[hostel].phone}**`,
      ru:`📞 Звоните:\n\n**${HOSTELS[hostel].phone}**`,
      ar:`📞 اتصل:\n\n**${HOSTELS[hostel].phone}**`,
      ca:`📞 Truca'ns:\n\n**${HOSTELS[hostel].phone}**`,
      gl:`📞 Chámanos:\n\n**${HOSTELS[hostel].phone}**`,
      eu:`📞 Deitu:\n\n**${HOSTELS[hostel].phone}**`
    };
    setTimeout(()=>{
      addBotMessage(phoneResponses[lang]||phoneResponses.en);
      showSuggestions();
    },400);
    return;
  }
  callClaude(text);
}

async function sendMessage(){
  const inp=document.getElementById('input');
  const text=inp.value.trim();
  if(!text||loading||!hostel) return;
  inp.value='';
  updateSendBtn();
  removeSuggestions();
  addUserMessage(text);
  callClaude(text);
}

async function callClaude(text){
  loading=true;
  showTyping();
  const newHistory=[...history,{role:"user",content:text}];
  try{
    const res=await fetch("https://proxy18.adrian-opatrny.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:getSystemPrompt(hostel,lang),
        messages:newHistory
      })
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||"Sorry, something went wrong.";
    history=[...newHistory,{role:"assistant",content:reply}];
    removeTyping();
    addBotMessage(reply);
    showSuggestions();
  }catch(e){
    removeTyping();
    addBotMessage("⚠️ Connection issue. Please try again or call us directly.");
    showSuggestions();
  }
  loading=false;
}

function formatText(text){
  return text
    .split('\n')
    .map(line=>{
      return line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    })
    .join('<br>');
}

function handleKey(e){
  if(e.key==='Enter') sendMessage();
}

function updateSendBtn(){
  const inp=document.getElementById('input');
  const btn=document.getElementById('sendBtn');
  const active=!inp.disabled&&inp.value.trim().length>0&&!loading;
  btn.className='send-btn'+(active?' active':'');
}

function scrollBottom(){
  const chat=document.getElementById('chat');
  setTimeout(()=>chat.scrollTop=chat.scrollHeight,100);
}
</script>
</body>
</html>
