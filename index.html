function getSystemPrompt(hostel, lang) {
  const h = HOSTELS[hostel];
  return `You are a friendly, concise guest assistant for ${hostel} hostel at Calle Príncipe 18, Madrid.

HOSTEL: ${hostel} ${h.emoji}
FLOOR: ${h.floor} floor, ${h.side} side (${h.floorEs} piso, ${h.sideEs})
PHONE: ${h.phone}

BUILDING ACCESS:
- Address: Calle Príncipe 18, 28012 Madrid — 2 min from Puerta del Sol
- Portal: iron gate-style doors (see-through)
- Landmark LEFT of entrance: 100 Montaditos restaurant
- Landmark RIGHT of entrance: La Abacería del Príncipe (open taberna)
- Intercom (telefonillo) at entrance — press the ${hostel} button
- Porter (portero) often in small room BEHIND the elevator on ground floor
- If no answer: call ${h.phone}

ELEVATOR (120 years old!):
- Has 3 doors: 1 on each floor + 2 on the cabin
- ALL 3 must be fully closed or it won't move
- If stuck: go check if a door is open on another floor
- Stairs are right next to it

GETTING HERE:
- Metro lines 1, 2, 3 → Sol (2 min walk)
- Cercanías C3 & C4 → Sol
- Taxi/Uber: ask for Plaza de Canalejas

NEARBY:
- La Abacería del Príncipe — tapas & wine, right next door
- 100 Montaditos — cheap food, next to entrance
- Plaza de Santa Ana — 2 min, great bars
- Plaza Mayor — 5 min walk
- Puerta del Sol — 2 min walk
- Prado Museum — 15 min walk
- Retiro Park — 20 min walk
- Gran Vía — 10 min walk

TONE RULES:
- Reply ONLY in ${LANG_NAMES[lang]}
- Be friendly and VERY concise — max 3-4 short lines
- Use 1-2 emojis per message naturally
- Sound like a helpful friend, not a robot
- NEVER mention other hostels in the building
- If asked for phone number, give: ${h.phone}
- If someone seems lost or panicking, be extra reassuring`;
}

function renderText(text) {
  return text.split('\n').map((line, i, arr) => {
    const parts = line.split(/(\*\*[^*]+\*\*)/g);
    return (
      <span key={i}>
        {parts.map((part, j) =>
          part.startsWith('**') && part.endsWith('**')
            ? <strong key={j} style={{color:"#e8c97a"}}>{part.slice(2,-2)}</strong>
            : part
        )}
        {i < arr.length-1 && <br/>}
      </span>
    );
  });
}

function App() {

  const [hostel, setHostel] = useState(null);
  const [messages, setMessages] = useState([{type:"welcome"}]);
  const [history, setHistory] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showSugg, setShowSugg] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, loading]);
  useEffect(() => { reset(); }, [lang]);

  function reset() {
    setHostel(null); setHistory([]); setShowSugg(false);
    setMessages([{type:"welcome"}]);
  }

  function selectHostel(name) {
    setHostel(name); setHistory([]); setShowSugg(false);
    const h = HOSTELS[name];
    const greetFn = GREETINGS[lang] || GREETINGS.en;
    setMessages([{type:"bot", text: greetFn(h, name)}]);
    setShowSugg(true);
    setTimeout(() => inputRef.current?.focus(), 300);
  }

  async function sendMessage(text) {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setShowSugg(false);
    setMessages(prev => [...prev, {type:"user", text:msg}]);
    setInput("");

    // Phone button
    if (msg.includes("📞")) {
      const phoneFn = PHONE_MSG[lang] || PHONE_MSG.en;
      setTimeout(() => {
        setMessages(prev => [...prev, {type:"bot", text: phoneFn(HOSTELS[hostel].phone)}]);
        setShowSugg(true);
      }, 400);
      return;
    }

    setLoading(true);
    const newHistory = [...history, {role:"user", content:msg}];
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system: getSystemPrompt(hostel, lang),
          messages: newHistory
        })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Sorry, something went wrong.";
      setHistory([...newHistory, {role:"assistant", content:reply}]);
      setMessages(prev => [...prev, {type:"bot", text:reply}]);
      setShowSugg(true);
    } catch {
      setMessages(prev => [...prev, {type:"bot", text:"⚠️ Connection issue. Please try again or call us directly."}]);
    }
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 100);

                <div style={{fontSize:"10px",color:mt,letterSpacing:"1px",textTransform:"uppercase"}}>Guest Assistant · 24/7</div>
              </div>
            </div>
            {hostel && (
              <button onClick={reset} style={{background:"transparent",border:"1px solid rgba(201,168,76,0.25)",color:mt,padding:"4px 10px",borderRadius:"10px",fontSize:"11px",fontFamily:"inherit"}}>
                ← Back
              </button>

            if (msg.type==="bot") return (
              <div key={i} style={{display:"flex",gap:"8px",alignItems:"flex-start"}}>
                <div style={{width:"28px",height:"28px",borderRadius:"50%",background:`linear-gradient(135deg,${g},#c60b1e)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",flexShrink:0,marginTop:"1px"}}>🏨</div>
                <div style={{background:dk2,border:"1px solid rgba(201,168,76,0.15)",borderRadius:"14px",borderTopLeftRadius:"4px",padding:"11px 14px",maxWidth:"82%",fontSize:"13.5px",color:cr,lineHeight:"1.6"}}>
                  {renderText(msg.text)}
                </div>
              </div>
            );
            if (msg.type==="user") return (
              <div key={i} style={{display:"flex",gap:"8px",alignItems:"flex-start",flexDirection:"row-reverse"}}>
                <div style={{width:"28px",height:"28px",borderRadius:"50%",background:dk3,border:"1px solid rgba(201,168,76,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",flexShrink:0}}>👤</div>
                <div style={{background:"linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.08))",border:"1px solid rgba(201,168,76,0.25)",borderRadius:"14px",borderTopRightRadius:"4px",padding:"11px 14px",maxWidth:"82%",fontSize:"13.5px",color:cr,lineHeight:"1.6"}}>
                  {msg.text}
                </div>
              </div>
            );
            return null;
          })}

          {showSugg && !loading && hostel && (
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px",paddingLeft:"36px"}}>
              {(SUGGESTIONS[lang]||SUGGESTIONS.en).map((s,i)=>(
                <button key={i} onClick={()=>sendMessage(s)} style={{
                  background:"transparent",border:"1px solid rgba(201,168,76,0.35)",
                  color:gl2,padding:"5px 11px",borderRadius:"14px",
                  fontSize:"12px",fontFamily:"inherit",whiteSpace:"nowrap"
                }}>{s}</button>
              ))}
            </div>
          )}

          {loading && (
            <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
              <div style={{width:"28px",height:"28px",borderRadius:"50%",background:`linear-gradient(135deg,${g},#c60b1e)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px"}}>🏨</div>
              <div style={{background:dk2,border:"1px solid rgba(201,168,76,0.15)",borderRadius:"14px",borderTopLeftRadius:"4px",padding:"12px 16px",display:"flex",gap:"5px",alignItems:"center"}}>
                {[0,1,2].map(i=>(
                  <div key={i} style={{width:"5px",height:"5px",borderRadius:"50%",background:g,opacity:0.7,animation:`bounce 1.2s ${i*0.2}s infinite`}}/>
                ))}
              </div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>

        {/* Input */}
        <div style={{padding:"10px 12px 12px",borderTop:"1px solid rgba(201,168,76,0.12)",display:"flex",gap:"8px",flexShrink:0,background:dk}}>
          <input
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyPress={e=>e.key==="Enter"&&sendMessage()}
            disabled={!hostel||loading}
            placeholder={hostel?(UI.placeholder[lang]||"Type your question..."):(UI.selectFirst[lang]||"← Select your hostel first")}
            style={{
              flex:1,background:dk2,
              border:`1px solid ${input&&hostel?"rgba(201,168,76,0.4)":"rgba(201,168,76,0.15)"}`,
              borderRadius:"20px",padding:"10px 16px",color:cr,
              fontSize:"13.5px",outline:"none",
              opacity:hostel?1:0.5,transition:"border-color 0.2s"
            }}
          />
          <button
            onClick={()=>sendMessage()}
            disabled={!hostel||loading||!input.trim()}
            style={{
              width:"40px",height:"40px",borderRadius:"50%",
              background:hostel&&!loading&&input.trim()?`linear-gradient(135deg,${g},#a8863a)`:dk3,
              border:"none",
              cursor:hostel&&!loading&&input.trim()?"pointer":"not-allowed",
              display:"flex",alignItems:"center",justifyContent:"center",
              flexShrink:0,
              boxShadow:hostel&&!loading&&input.trim()?"0 2px 12px rgba(201,168,76,0.3)":"none"
            }}
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill={hostel&&!loading&&input.trim()?dk:mt}>
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>


</body></html>
